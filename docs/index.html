<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Offline-First Docs</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/docsify-themeable@0/dist/css/theme-simple.css">
  <style>
    :root {
      --theme-color: #3ecf8e;
      --sidebar-width: 280px;
      --sidebar-nav-link-color--active: var(--theme-color);
      --sidebar-nav-link-font-weight--active: 600;
      --sidebar-nav-link-border-color--active: var(--theme-color);
      --content-max-width: 48em;
      --heading-h1-font-size: 1.8rem;
      --heading-h2-font-size: 1.4rem;
      --heading-h2-border-color: #eee;
      --heading-h2-border-style: solid;
      --heading-h2-border-width: 0 0 1px 0;
      --heading-h2-padding: 0 0 0.4em 0;
      --code-block-border-radius: 6px;
      --code-inline-background: #f4f5f6;
      --code-inline-border-radius: 3px;
      --code-inline-padding: 0.15em 0.4em;
      --blockquote-border-color: var(--theme-color);
      --blockquote-border-width: 0 0 0 3px;
      --table-cell-border-color: #eee;
    }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
    }
    .sidebar .app-name {
      font-size: 1.1rem;
      font-weight: 700;
      letter-spacing: -0.02em;
    }
    .sidebar-nav > ul > li > a {
      font-weight: 600;
      text-transform: uppercase;
      font-size: 0.75rem;
      letter-spacing: 0.05em;
      color: #999;
      pointer-events: none;
    }
    .sidebar-nav > ul > li > ul > li > a {
      font-weight: 500;
      font-size: 0.85rem;
    }
    .markdown-section h1 + blockquote {
      border-left: 3px solid var(--theme-color);
      background: #f0fdf4;
      padding: 0.8em 1em;
      margin-top: -0.5em;
      border-radius: 0 6px 6px 0;
    }
    .markdown-section table {
      display: table;
      width: 100%;
    }
    .markdown-section table th {
      font-weight: 600;
      background: #fafafa;
    }
    .search .input-wrap {
      border-radius: 6px;
    }
  </style>
</head>
<body>
  <div id="app"></div>

  <script>
    window.$docsify = {
      name: 'Offline-First',
      repo: 'https://github.com/virtualian/offline-first',
      loadSidebar: true,
      subMaxLevel: 2,
      homepage: 'developers/explanation/online-first.md',
      search: {
        placeholder: 'Search docs...',
        noData: 'No results.',
        depth: 2
      },
      auto2top: true,
      // Mermaid rendering
      markdown: {
        renderer: {
          code(code, lang) {
            if (lang === 'mermaid') {
              return '<div class="mermaid">' + code + '</div>'
            }
            return this.origin.code.apply(this, arguments)
          }
        }
      }
    }
  </script>

  <!-- Docsify -->
  <script src="https://cdn.jsdelivr.net/npm/docsify@4/lib/docsify.min.js"></script>

  <!-- Search -->
  <script src="https://cdn.jsdelivr.net/npm/docsify@4/lib/plugins/search.min.js"></script>

  <!-- Copy code -->
  <script src="https://cdn.jsdelivr.net/npm/docsify-copy-code@2/dist/docsify-copy-code.min.js"></script>

  <!-- Mermaid -->
  <script src="https://cdn.jsdelivr.net/npm/mermaid@11/dist/mermaid.min.js"></script>
  <script>
    mermaid.initialize({ startOnLoad: false, theme: 'default' })

    // Re-render Mermaid diagrams after each page load
    window.$docsify.plugins = [function (hook) {
      hook.doneEach(function () {
        mermaid.run({ querySelector: '.mermaid' })
      })
    }]
  </script>

  <!-- Syntax highlighting -->
  <script src="https://cdn.jsdelivr.net/npm/prismjs@1/components/prism-sql.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/prismjs@1/components/prism-bash.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/prismjs@1/components/prism-yaml.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/prismjs@1/components/prism-json.min.js"></script>
</body>
</html>
